name: Quantocracy 자동 수집 및 배포

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      pages:
        description: '수집 페이지 범위 (예: 1-5, 전체는 1-226)'
        required: false
        default: '1-3'
      translate_limit:
        description: '번역 최대 수'
        required: false
        default: '30'

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install feedparser requests beautifulsoup4 schedule anthropic

      - name: 아티클 수집
        run: python quantocracy_scraper.py --pages "${{ github.event.inputs.pages || '1-3' }}"

      - name: 한국어 번역
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python quantocracy_scraper.py --translate --limit "${{ github.event.inputs.translate_limit || '30' }}" --krx-only
          else
            echo "API 키 없음 - 번역 스킵"
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: KRX 아이디어 생성 (월요일만)
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ] && [ "$(date +%u)" = "1" ]; then
            python quantocracy_scraper.py --ideas --days 7
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: JSON 내보내기
        run: |
          python quantocracy_scraper.py --export
          mkdir -p docs
          cp quant_articles.json docs/
          cp quant_library.html docs/index.html
          if [ -f krx_ideas.json ]; then cp krx_ideas.json docs/; fi

      - name: 통계 출력
        run: python quantocracy_scraper.py --stats

      - name: Git 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ quant_articles.json
          if [ -f krx_ideas.json ]; then git add krx_ideas.json; fi
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: 자동 수집 $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Pages 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Pages 배포
        uses: actions/deploy-pages@v4
